name: Publish NuGet

# Publica o pacote no nuget.org quando uma release do GitHub é publicada.
# A versão do pacote vem da tag da release (ex.: tag "v1.2.0" -> pacote 1.2.0).
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derivar versão da tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: dotnet pack src/FiapCloudGames.Contracts/FiapCloudGames.Contracts.csproj
          -c Release
          -o out
          /p:Version=${{ steps.version.outputs.value }}

      - name: Push para nuget.org
        run: dotnet nuget push "out/*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
